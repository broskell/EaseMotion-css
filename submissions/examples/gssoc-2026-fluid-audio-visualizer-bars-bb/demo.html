<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluid Audio Equalizer Visualizer - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="audio-card">
    <div class="track-info">
      <div class="album-art">
        <span class="music-icon">🎵</span>
      </div>
      <div class="track-details">
        <h2 class="track-title">Cybernetic Echoes</h2>
        <p class="artist-name">Synthesizer Odyssey — Hi-Res Lossless</p>
      </div>
    </div>

    <div class="equalizer-wrapper" id="equalizer">
      <div class="eq-bar bar-1"></div>
      <div class="eq-bar bar-2"></div>
      <div class="eq-bar bar-3"></div>
      <div class="eq-bar bar-4"></div>
      <div class="eq-bar bar-5"></div>
      <div class="eq-bar bar-6"></div>
      <div class="eq-bar bar-7"></div>
      <div class="eq-bar bar-8"></div>
      <div class="eq-bar bar-9"></div>
      <div class="eq-bar bar-10"></div>
    </div>

    <div class="audio-controls">
      <button class="ctrl-btn" id="playBtn">⏸ Pause</button>
      <span class="audio-time">02:45 / 04:12</span>
    </div>
  </div>

  <script>
    const playBtn = document.getElementById('playBtn');
    const eq = document.getElementById('equalizer');
    let isPlaying = true;

    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      eq.classList.toggle('paused', !isPlaying);
      playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
    });
  </script>
</body>
</html>
