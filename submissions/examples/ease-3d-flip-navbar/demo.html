<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease 3D Flip Navbar — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; background: #0a0912; font-family: system-ui, sans-serif; }
    .demo-page-content {
      padding: 60px 40px;
      color: #94a3b8;
      max-width: 640px;
    }
    .demo-hint { color: #f97066; font-weight: 600; }
  </style>
</head>
<body>

  <nav class="ease-navbar">
    <div class="logo-cube-wrap">
      <div class="logo-cube">
        <div class="cube-face front">E</div>
        <div class="cube-face back">M</div>
        <div class="cube-face right">✦</div>
        <div class="cube-face left">✦</div>
        <div class="cube-face top">✦</div>
        <div class="cube-face bottom">✦</div>
      </div>
    </div>

    <ul class="nav-links">
      <li class="nav-item is-active">
        <div class="nav-flip">
          <span class="nav-face face-text">Work</span>
          <span class="nav-face face-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect></svg>
            Work
          </span>
        </div>
      </li>
      <li class="nav-item">
        <div class="nav-flip">
          <span class="nav-face face-text">About</span>
          <span class="nav-face face-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c0-4 4-6 8-6s8 2 8 6"></path></svg>
            About
          </span>
        </div>
      </li>
      <li class="nav-item">
        <div class="nav-flip">
          <span class="nav-face face-text">Journal</span>
          <span class="nav-face face-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"></path><path d="M4 9h16"></path></svg>
            Journal
          </span>
        </div>
      </li>
      <li class="nav-item">
        <div class="nav-flip">
          <span class="nav-face face-text">Contact</span>
          <span class="nav-face face-icon">
            <svg viewBox="0 0 24 24"><path d="M3 8l9 6 9-6"></path><rect x="3" y="5" width="18" height="14" rx="2"></rect></svg>
            Contact
          </span>
        </div>
      </li>
    </ul>

    <input type="checkbox" id="mobileMenuToggle" class="menu-toggle-input" />
    <label for="mobileMenuToggle" class="menu-toggle-label" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </label>

    <div class="mobile-menu-panel">
      <ul>
        <li><a href="#">Work</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Journal</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="demo-page-content">
    <p class="demo-hint">Hover each nav link to see the 3D flip.</p>
    <p>Resize the window below 820px to see the mobile menu open with a real 3D page-turn effect instead of a simple slide.</p>
  </div>

</body>
</html>
