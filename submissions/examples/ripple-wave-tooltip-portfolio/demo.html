<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio - Ripple-Wave Tooltip Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-tooltip-canvas">
    <div class="portfolio-card-frame">
      
      <div class="card-meta-header">
        <span class="category-tag">FULL-STACK AI SYSTEM</span>
        <h3>Cyberbullying Detection System</h3>
      </div>

      <div class="tooltip-display-area">
        <!-- Pure CSS Ripple-Wave Tooltip Wrapper -->
        <div class="ripple-wave-tooltip-container">
          <button class="tooltip-trigger-btn" aria-describedby="tooltip-info">
            <span>Live Telemetry</span>
          </button>

          <div id="tooltip-info" class="ripple-tooltip-card" role="tooltip">
            <div class="tooltip-arrow-node"></div>
            <div class="tooltip-content-body">
              <div class="ripple-header-row">
                <div class="ripple-node-wrapper">
                  <span class="ripple-wave-ring wave-1"></span>
                  <span class="ripple-wave-ring wave-2"></span>
                  <span class="ripple-beacon-dot"></span>
                </div>
                <h4>Active Detection Stream</h4>
              </div>
              <p>Monitors text stream inputs and emits real-time classification vectors.</p>
            </div>
          </div>
        </div>
      </div>

      <p class="panel-caption-footer">Hover or focus the button to trigger tooltip overlay with continuous acoustic ripple wave propagation.</p>
    </div>
  </main>

</body>
</html>
