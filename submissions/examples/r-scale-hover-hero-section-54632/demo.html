<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Scale-Hover Hero Section</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

    <div class="hero-content">

        <span class="badge">
            Creative Portfolio
        </span>

        <h1>
            Build Beautiful Experiences With Pure CSS
        </h1>

        <p>
            A responsive hero section featuring elegant scale-hover
            interactions, layered portfolio cards, and modern gradients.
        </p>

        <div class="hero-buttons">

            <a href="#" class="btn primary">
                Start Project
            </a>

            <a href="#" class="btn secondary">
                View Portfolio
            </a>

        </div>

    </div>

    <div class="hero-preview">

        <div class="preview-card card-one"></div>
        <div class="preview-card card-two"></div>
        <div class="preview-card card-three"></div>

    </div>

</section>

</body>
</html>
